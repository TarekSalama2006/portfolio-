<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> chronova Login</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="img/logo/file_00000000a48c71f48dfceedc4e0fcb00.jpg">
</head>
<body>

<div class="container">

    <div class="left-side">

        <h1>CHRONOVA LOGIN</h1>
       
        <p>Luxury Watches</p>

        <div class="watch-box">
            <img src="img/logo/file_00000000a48c71f48dfceedc4e0fcb00.jpg" alt="watch">
        </div>

        <p class="quote">
            Elegance is not about being noticed,<br>
            it's about being remembered.
        </p>
    </div>

    <div class="right-side">

        <div class="login-card">

            <h3>WELCOME BACK</h3>
            <h2>Sign In To Your Account</h2>

            <form>

                <label>Email Address</label>
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input id="email" type="email" placeholder="Enter your email">
                     <span class="icon">✉</span>
                </div>

                <label>Password</label>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input id="password" type="password" placeholder="Enter your password">
                      <span class="icon">🔒</span>
                </div>

                <div class="options">
                    <span>
                        <input type="checkbox">
                        Remember Me
                    </span>

                    <a href="#">Forgot Password?</a>
                </div>

               <button type="button" class="btn" id="loginBtn">Sign In</button>

            </form>

            <div class="or">
                <span>OR CONTINUE WITH</span>
            </div>

            <div class="social">
                <button id="gbtn">google</button>
                <button id="fbtn">Facebook</button>
                <button id="abtn">Apple</button>
            </div>

            <p class="register">
                Don't have an account?
                <a href="#">Create Account</a>
            </p>

        </div>

    </div>

</div>
    <!-- قسم التحميل -->
    <div class="loader-overlay" id="loaderOverlay">

        <div class="clock">
            <div class="hand hour"   id="hourHand"></div>
            <div class="hand minute" id="minuteHand"></div>


            
            <div class="center-dot"></div>
            <div class="mark m12"></div>
            <div class="mark m3"></div>
            <div class="mark m6"></div>
            <div class="mark m9"></div>
        </div>

        <p class="loader-text">Signing In...</p>

    </div>
  <script src="script.js"></script>

</body>
</html>
